name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/sdk-ci.yml"
  pull_request:
    paths:
      - "sdk/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/sdk-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @morva/sdk typecheck
      - run: pnpm --filter @morva/sdk test
      - run: pnpm --filter @morva/sdk build
