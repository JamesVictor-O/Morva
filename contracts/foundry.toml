[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Pinned so a build/deploy always uses the exact same compiler + settings —
# Arbiscan verification requires the verifying build to match the deployed
# bytecode exactly, and that's only reproducible if these aren't left to
# whatever solc happens to be installed locally.
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
